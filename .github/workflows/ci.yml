name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs on the same branch to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # C/C++ build + unit tests
  # ---------------------------------------------------------------------------
  cpp:
    name: C++ build + gtest
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            liburing-dev

      - name: Configure
        run: cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: ctest
        run: ctest --test-dir build --output-on-failure --timeout 60

      - name: Inspect artifacts
        if: always()
        run: |
          ls -la build/core-abi || true
          file build/core-abi/libkvcache.so 2>/dev/null || true

      # Phase B1 — io_uring opt-in build. Reuses the toolchain step
      # above (liburing-dev is in the apt list). Runs only the
      # NvmeTier tests with --output-on-failure so a regression here
      # surfaces loudly; the rest of ctest stays in the default
      # blocking-path build above. Keep these as one extra ~5s job
      # rather than doubling the matrix.
      - name: Configure (io_uring)
        run: |
          cmake -S src -B build-uring -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DKVCACHE_ENABLE_URING=ON

      - name: Build (io_uring)
        run: cmake --build build-uring -j --target test_nvme_tier

      - name: ctest (io_uring nvme_tier only)
        run: ctest --test-dir build-uring --output-on-failure --timeout 60 \
                   -R '^NvmeTier'

      # Phase B10 — RocksDB opt-in build. Ubuntu's librocksdb-dev often
      # ships no CMake config, so the top-level find_package falls back
      # to find_library (see src/CMakeLists.txt). Runs only the
      # Rocksdb*/SealedChunk*/TenantQuota* tests.
      - name: Install RocksDB
        run: sudo apt-get install -y --no-install-recommends librocksdb-dev

      - name: Configure (rocksdb)
        run: |
          cmake -S src -B build-rocksdb -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DKVCACHE_ENABLE_ROCKSDB=ON

      - name: Build (rocksdb)
        run: cmake --build build-rocksdb -j --target test_rocksdb_store

      - name: ctest (rocksdb store only)
        run: ctest --test-dir build-rocksdb --output-on-failure --timeout 120 \
                   -R 'Rocksdb|SealedChunk|TenantQuota'

  # ---------------------------------------------------------------------------
  # Go control-plane — fast unit tests (excluded: integration tag)
  # ---------------------------------------------------------------------------
  go-cp:
    name: Go control-plane
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src/control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: src/control-plane/go.sum

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (unit, no integration tag)
        run: go test ./... -short -count=1

  # ---------------------------------------------------------------------------
  # Go control-plane — embedded-etcd integration test
  # ---------------------------------------------------------------------------
  go-cp-integration:
    name: Go control-plane (integration / embedded etcd)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src/control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: src/control-plane/go.sum
      - name: test (integration)
        run: go test -tags=integration -count=1 -timeout 2m ./internal/membership/...

  # ---------------------------------------------------------------------------
  # Go operator + kvctl — build only (controller scaffolding has no tests yet)
  # ---------------------------------------------------------------------------
  go-operator:
    name: Go operator
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src/operator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: src/operator/go.sum
      - run: go vet ./...
      - run: go build ./...

  go-kvctl:
    name: Go kvctl
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src/kvctl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: src/kvctl/go.sum
      - run: go vet ./...
      - run: go build ./...

  # ---------------------------------------------------------------------------
  # Python adapter — runs the in-process E2E demo against the C ABI.
  # ---------------------------------------------------------------------------
  python-adapter:
    name: Python adapter (E2E demo)
    needs: cpp
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            libcurl4-openssl-dev

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install Python deps
        run: pip install cffi pytest

      - name: Build libkvcache.so
        run: |
          cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DKVCACHE_BUILD_TESTS=OFF
          cmake --build build --target kvcache -j

      - name: pytest E2E demo
        env:
          KVCACHE_LIB: ${{ github.workspace }}/build/core-abi/libkvcache.so
        # Note: must invoke at src/adapters (not src/adapters/vllm/tests)
        # so the adapters-level conftest.py runs — it puts
        # kvcache_core / kvcache_vllm on sys.path. Drilling deeper
        # pins pytest's rootdir to src/adapters/vllm/ (because of its
        # pyproject.toml) and the conftest is then out-of-scope.
        run: pytest src/adapters -v

  # ---------------------------------------------------------------------------
  # Phase S-7 — scheduler fairness + P0-starvation regression gate.
  # Runs bench_fairness --strict and bench_priority --strict; fails the
  # build if Jain index < 0.85 or P0 lane completes fewer than 5 ops
  # over the bench window. Push-to-main only so PRs don't pay the ~5s
  # cost; the gate catches drift before release.
  # ---------------------------------------------------------------------------
  bench-gates:
    name: Scheduler fairness + priority gates (S-7)
    needs: cpp
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            libcurl4-openssl-dev

      - name: Build bench targets
        run: |
          cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target bench_fairness bench_priority -j

      - name: bench_fairness --strict
        run: build/bench/bench_fairness --strict

      - name: bench_priority --strict
        run: build/bench/bench_priority --strict

  # ---------------------------------------------------------------------------
  # Phase P-4 — vLLM-present bridge tests. Pip-installs vLLM so the
  # skip-marked tests in test_vllm_bridge.py (full lifecycle, P-3
  # save_kv_layer fan-in, P-3.1 start_load_kv fan-out, P-3.2 async
  # load) run against the real KVConnectorBase + KVConnectorRole
  # imports. Heavyweight install (~4–5 GB) so this lane is opt-in:
  #
  #   * Manual: trigger via the Actions tab (workflow_dispatch).
  #   * On push to main: only when the commit message contains the
  #     literal token "[ci-vllm]".
  # ---------------------------------------------------------------------------
  python-adapter-vllm:
    name: Python adapter (vLLM bridge — P-4)
    needs: cpp
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[ci-vllm]')
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            libcurl4-openssl-dev

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Cache pip (torch + vllm are heavy)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-vllm-${{ runner.os }}-py311-v1

      - name: Install Python deps (cffi + pytest + vllm)
        # vLLM's CUDA-only wheels install cleanly on CPU runners — we
        # only import KVConnectorBase / KVConnectorRole from
        # vllm.distributed.kv_transfer.kv_connector.v1.base, which is
        # CUDA-free. No model is loaded in the bridge tests.
        run: |
          pip install --upgrade pip
          pip install cffi pytest
          # Phase P-4.2 — unpinned. The CI lane has now run end-to-end
          # green against both v0.8.5 and v0.9.2 with identical
          # results (32 passed / 1 skipped — the skip is
          # test_bridge_import_fails_cleanly_without_vllm, correctly
          # skipped when vLLM IS installed). The earlier worry that
          # newer abstract methods (request_finished_all_groups,
          # aggregate) on KVConnectorBase_V1 would break us was a
          # misread — those live on the SupportsHMA +
          # KVConnectorWorkerMetadata mixins, not the base class we
          # subclass. The one real drift (request_finished return
          # type) is now handled by the bridge returning
          # (False, None) — forward-compatible with current vLLM
          # and harmless on older versions that ignored the return.
          # If a future vLLM release breaks compatibility, the
          # ci-vllm lane will catch it on the next push; pin then.
          pip install --upgrade vllm
          python -c "import vllm; print('vllm', vllm.__version__)"

      - name: Build libkvcache.so
        run: |
          cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DKVCACHE_BUILD_TESTS=OFF
          cmake --build build --target kvcache -j

      - name: pytest bridge tests (vllm-present path)
        env:
          KVCACHE_LIB: ${{ github.workspace }}/build/core-abi/libkvcache.so
        # Note: must invoke at src/adapters (not src/adapters/vllm/tests)
        # so the adapters-level conftest.py runs — it puts
        # kvcache_core / kvcache_vllm on sys.path. Drilling deeper
        # pins pytest's rootdir to src/adapters/vllm/ (because of its
        # pyproject.toml) and the conftest is then out-of-scope.
        run: pytest src/adapters -v

  # ---------------------------------------------------------------------------
  # Helm chart lint
  # ---------------------------------------------------------------------------
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: "v3.14.0" }
      - run: helm lint src/deploy/helm/kvcache
      - run: helm template kvcache src/deploy/helm/kvcache > /tmp/rendered.yaml
      - run: head -40 /tmp/rendered.yaml
