// LLD §3 / §4 — Node ↔ Node and KVAgent ↔ Node RPCs.
//
// All data transfers (KV bytes) flow over NIXL Pull, NOT gRPC. gRPC carries
// only metadata: lookup queries, slot reservation tickets, seal commits,
// event subscription, bloom-sketch fan-out.
syntax = "proto3";
package kvcache.proto;

import "events.proto";

option go_package = "github.com/Stephen-Pu/kvcache/control-plane/internal/pb";

// ============================================================================
// KVAgent  -> Node  (data-plane control)
// ============================================================================

service NodeData {
  // LPM over the local ART. Hot path, p99 ≤ 10µs (LLD §9.1).
  rpc Lookup    (LookupRequest)    returns (LookupResponse);

  // Allocate a mutable T1 slot for streaming write (LLD §3.4).
  rpc Reserve   (ReserveRequest)   returns (ReserveResponse);

  // Advance watermark on an in-progress streaming write.
  rpc Publish   (PublishRequest)   returns (PublishResponse);

  // Submit a fetch plan; server schedules NIXL Pull (LLD §3.5 / §5.1).
  rpc Fetch     (FetchRequest)     returns (FetchResponse);

  // Atomic seal: RocksDB write + ART insert + ADD event (LLD §3.4).
  rpc Seal      (SealRequest)      returns (SealResponse);

  // Caller-side refcount drop.
  rpc Release   (ReleaseRequest)   returns (ReleaseResponse);

  // Server-side push of KV events (LLD §2.2). Long-lived stream.
  rpc Subscribe (SubscribeRequest) returns (stream Event);

  // Primary-side read for A9 DR replication: resolve a locator to its sealed
  // chunk_path + bytes. Read-only; gated by VerifyInternalPeer (A11) in the
  // handler. Deferred cross-cluster surface of the in-process ReplicaFetch.
  rpc ReplicaFetch (ReplicaFetchRequest) returns (ReplicaFetchResponse);
}

message LookupRequest {
  string  tenant_id      = 1;  // mTLS-attested; double-checked server-side
  fixed64 model_id_hash  = 2;
  repeated uint32 tokens = 3;  // request token prefix
  uint32  client_epoch   = 4;  // optimistic concurrency w/ routing cache
  // Phase Q-6 — explicit tenant_id fingerprint to keep Reserve and
  // Lookup landing on the same per-(tenant, model) ART namespace
  // without the server having to recompute it from `tenant_id`.
  // MUST equal what Reserve's Locator.tenant_id (16 bytes) hashes to
  // under the server's HashTenantBytes16. Python connector populates
  // it as FNV-1a(SHA-1(tenant_string)[:16]); the C ABI uses
  // ctx->tenant_id_hash directly. When zero the server falls back to
  // deriving the value from `tenant_id` for backward compat with
  // pre-Q-6 clients.
  fixed64 tenant_id_hash = 5;
}

message LookupResponse {
  bool     hit              = 1;
  Locator  locator          = 2;
  fixed64  server_handle    = 3;  // opaque, server-issued; used by Fetch/Release
  uint32   matched_tokens   = 4;
  TierMap  tier_residency   = 5;  // which tiers hold which ranges (informational)
}

message TierMap {
  // Per-tier coverage bitmap (over the locator's full range). The agent does
  // not act on this directly — it informs telemetry and debugging only.
  repeated TierCoverage tiers = 1;
}

message TierCoverage {
  Tier   tier              = 1;
  uint32 covered_tokens    = 2;
  uint32 covered_layers    = 3;
}

message ReserveRequest {
  Locator locator      = 1;
  uint64  bytes        = 2;
  uint32  priority     = 3;  // 0=P0, 1=P1, 2=P2 (LLD §5.1)
  uint32  ttl_seconds  = 4;  // 0 = server default (5 min)
}

message ReserveResponse {
  fixed64 server_handle = 1;
  // The NIXL-registered slot the caller writes into.
  uint64  slot_iova     = 2;  // server-mapped address (in-process only)
  uint64  slot_bytes    = 3;
  uint32  mr_key        = 4;  // server-local NIXL memory key
  // Phase M-3 B — opaque NIXL RemoteMrDescriptor describing the slot,
  // produced by INixlBackend::ExportMr. Cross-process / cross-node
  // callers feed this to their own backend's ImportRemoteMr so the
  // server-initiated Pull can target the slot without sharing an
  // address space. Empty when the backend doesn't support export
  // (e.g. the in-process loopback path with an unregistered slot).
  bytes   remote_mr_descriptor = 5;
}

message PublishRequest {
  fixed64 server_handle = 1;
  uint64  watermark     = 2;
}
message PublishResponse {
  // Scheduler may report queue position for backpressure (informational).
  uint32 queue_position = 1;
}

message FetchRequest {
  fixed64  server_handle  = 1;
  repeated Range ranges   = 2;
  // Destination buffer descriptor (caller-side NIXL MR).
  uint64   dst_iova       = 3;
  uint64   dst_bytes      = 4;
  uint32   dst_mr_key     = 5;
  uint32   priority       = 6;
  // Phase M-3 B — opaque NIXL RemoteMrDescriptor for the destination
  // buffer. When non-empty the server calls ImportRemoteMr on it to
  // resolve a backend-local key and uses that as the Pull destination,
  // ignoring `dst_iova` / `dst_mr_key`. Empty falls back to the
  // legacy in-process path.
  bytes    dst_remote_mr_descriptor = 7;
}

message FetchResponse {
  fixed64 completion_id = 1;  // poll/await via Subscribe or a future Wait RPC
}

message SealRequest    {
  fixed64 server_handle = 1;
  // The token sequence the agent committed during streaming write.
  // The server derives the ART path from these tokens (chunked by 16),
  // so identical token lists from concurrent writers collide on the
  // same ART leaf — exactly what we want for prefix reuse.
  repeated uint32 tokens = 2;
}
message SealResponse   { Locator locator = 1; uint64 epoch = 2; }

message ReleaseRequest { fixed64 server_handle = 1; }
message ReleaseResponse{}

message SubscribeRequest {
  string  tenant_id     = 1;
  uint64  start_epoch   = 2;  // 0 = "from now"
  repeated EventType include = 3; // empty = all
}

message ReplicaFetchRequest {
  Locator locator = 1;   // the sealed chunk's locator (prefix_hash etc.)
}
message ReplicaFetchResponse {
  int32          status     = 1;  // KV_OK (0) on hit; KV_E_NOT_FOUND otherwise
  repeated bytes chunk_path = 2;  // K entries, each exactly 8 bytes (a ChunkHash)
  bytes          data       = 3;  // the sealed KV bytes (empty on miss)
}

// ============================================================================
// Node  <->  Node  (cluster-internal)
// ============================================================================

service NodePeer {
  // Pull bloom-sketch view of peer's cache (LLD §4.2). Called every 30s by CP.
  rpc GetBloomSketch (BloomSketchRequest) returns (BloomSketchResponse);

  // Health probe (LLD §4.1 — Etcd lease + this for fast path).
  rpc Ping (PingRequest) returns (PingResponse);
}

message BloomSketchRequest {
  string tenant_id = 1; // empty = all
}
message BloomSketchResponse {
  bytes  bits         = 1; // serialized bloom filter
  uint64 num_inserted = 2;
  uint32 k_hashes     = 3;
  uint32 m_bits       = 4;
  uint64 epoch        = 5;
}

message PingRequest  { uint64 nonce = 1; }
message PingResponse { uint64 nonce = 1; uint64 node_epoch = 2; }
